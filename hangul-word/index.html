<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 단어 맞히기 — AI 게임 랩</title>
<meta name="description" content="매일 바뀌는 두 글자 한글 단어를 6번 안에 맞혀보세요. 자모 단위로 힌트를 주는 한글판 워들. AI 코딩(바이브 코딩)으로 만든 무료 브라우저 게임.">
<meta name="keywords" content="한글 워들, 한글 단어 게임, 데일리 퍼즐, AI 코딩, 바이브 코딩, 무료 브라우저 게임">
<link rel="stylesheet" href="../shared.css">
<style>
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 18px; max-width:560px; margin:0 auto; }
  .topbar .home{ font-size:.85rem; color:var(--muted); }
  .game{ max-width:460px; margin:0 auto; padding:6px 20px 60px; }
  .title{ text-align:center; margin:6px 0 2px; font-size:1.4rem; }
  .sub{ text-align:center; color:var(--muted); font-size:.85rem; margin:0 0 10px; }
  .hints{ max-width:420px; margin:2px auto 14px; display:flex; flex-direction:column; gap:6px; }
  .hints.locked{ text-align:center; color:var(--muted); font-size:.85rem; background:var(--panel);
        border:1px dashed var(--border); border-radius:12px; padding:11px 14px; }
  .hint-item{ text-align:left; background:rgba(46,160,67,.1); border:1px solid rgba(46,160,67,.28);
        color:#c8f0d3; border-radius:10px; padding:8px 12px; font-size:.92rem; line-height:1.4; }
  .hint-n{ display:inline-block; font-weight:800; color:#eafff0; background:rgba(46,160,67,.35);
        border-radius:6px; padding:1px 7px; margin-right:8px; font-size:.76rem; }

  .board{ display:flex; flex-direction:column; gap:10px; align-items:center; margin-bottom:16px; min-height:60px; }
  .row{ display:flex; gap:14px; }
  .syl{ display:flex; flex-direction:column; align-items:center; gap:5px;
        min-width:64px; padding:8px 6px; border-radius:12px; background:var(--panel); border:1px solid var(--border); }
  .syl-char{ font-size:1.7rem; font-weight:800; line-height:1; }
  .jamo-row{ display:flex; gap:3px; }
  .jamo{ display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px;
         border-radius:5px; font-size:.8rem; font-weight:700; background:#2a2f3a; color:var(--muted); }
  .jamo.G{ background:var(--good); color:#08260f; }
  .jamo.Y{ background:#caa93a; color:#2a2205; }
  .jamo.X{ background:#3a4150; color:#aeb4bf; }

  .answerbox{ display:flex; gap:8px; margin-top:6px; }
  .answerbox input{ flex:1; padding:14px 16px; border-radius:12px; border:1px solid var(--border);
        background:var(--panel); color:var(--text); font-size:1.15rem; text-align:center; letter-spacing:6px; }
  .answerbox input:focus{ outline:none; border-color:var(--accent); background:var(--panel-2); }
  .help{ text-align:center; color:var(--muted); font-size:.78rem; margin-top:14px; line-height:1.6; }
  .help b{ color:var(--text); font-weight:600; }
  .swatch{ display:inline-block; width:11px; height:11px; border-radius:3px; vertical-align:middle; margin:0 2px; }

  .result{ text-align:center; margin-top:6px; }
  .result .headline{ font-size:1.3rem; font-weight:800; margin:4px 0 6px; }
  .result .answer{ font-size:1.05rem; color:var(--muted); margin-bottom:14px; }
  .result .answer b{ color:#8ee6a8; font-size:1.2rem; }
  .mystats{ display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:300px; margin:0 auto 18px; }
  .mystats .stat{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:9px 8px; font-size:.82rem; color:var(--muted); }
  .mystats .stat b{ display:block; color:var(--text); font-size:1.25rem; font-weight:800; margin-top:2px; }
  .actions{ display:flex; flex-direction:column; gap:10px; max-width:280px; margin:0 auto; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="home" href="../">← 게임 랩</a>
    <span class="badge">🟩 한글 단어 맞히기</span>
    <span style="width:56px"></span>
  </div>

  <main class="game" id="game"></main>

  <script src="../share.js"></script>
  <script src="../stats.js"></script>
  <script>
  /* ================= 한글 자모 ================= */
  var CHO  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  var JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  var JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

  function isSyllable(ch){ var c=ch.charCodeAt(0); return c>=0xAC00 && c<=0xD7A3; }
  function decompose(ch){ var code=ch.charCodeAt(0)-0xAC00; return [CHO[Math.floor(code/588)], JUNG[Math.floor((code%588)/28)], JONG[code%28]]; }
  // 두 글자 단어 -> 자모 6칸 [초1,중1,종1, 초2,중2,종2] (종성 없으면 '')
  function slotsOf(word){ var s=[]; for(var i=0;i<word.length;i++){ var d=decompose(word[i]); s.push(d[0],d[1],d[2]); } return s; }

  // 워들식 판정: 각 칸 'G'(맞음) / 'Y'(있지만 다른자리) / 'X'(없음) / 'empty'(입력 없음)
  function evaluate(guess, answer){
    var g=slotsOf(guess), a=slotsOf(answer);
    var res=new Array(6), consumed=new Array(6);
    var i;
    for(i=0;i<6;i++){ res[i]=(g[i]===''?'empty':'X'); consumed[i]=false; }
    for(i=0;i<6;i++){ if(g[i]!=='' && g[i]===a[i]){ res[i]='G'; consumed[i]=true; } }
    var pool={};
    for(i=0;i<6;i++){ if(!consumed[i] && a[i]!==''){ pool[a[i]]=(pool[a[i]]||0)+1; } }
    for(i=0;i<6;i++){
      if(res[i]==='G'||res[i]==='empty') continue;
      if(pool[g[i]]>0){ res[i]='Y'; pool[g[i]]--; } else res[i]='X';
    }
    return res;
  }

  /* ================= 단어 풀 & 오늘의 단어 ================= */
  // w=정답, cat=세부 분류, desc=한 줄 설명. (큰 갈래는 CAT2MEGA로 자동 매핑, 초성·첫글자는 정답에서 자동)
  var WORDS = [
    {w:"사과",cat:"과일",desc:"빨갛고 아삭한 흔한 과일"},
    {w:"바다",cat:"자연",desc:"파도가 치는 넓고 짠 물"},
    {w:"하늘",cat:"날씨·하늘",desc:"고개 들면 보이는 파란 공간"},
    {w:"구름",cat:"날씨·하늘",desc:"하늘에 떠다니는 하얀 것"},
    {w:"나무",cat:"자연",desc:"숲을 이루는 키 큰 식물"},
    {w:"학교",cat:"장소",desc:"학생들이 공부하러 가는 곳"},
    {w:"친구",cat:"사람",desc:"가깝게 지내는 사이"},
    {w:"가족",cat:"사람",desc:"함께 사는 한 집안 사람들"},
    {w:"사랑",cat:"눈에 안 보이는 것",desc:"아끼고 좋아하는 마음"},
    {w:"행복",cat:"눈에 안 보이는 것",desc:"기쁘고 만족스러운 상태"},
    {w:"시간",cat:"눈에 안 보이는 것",desc:"시계가 흐르며 재는 것"},
    {w:"겨울",cat:"계절",desc:"눈 오고 추운 계절"},
    {w:"여름",cat:"계절",desc:"덥고 해가 긴 계절"},
    {w:"노래",cat:"예술",desc:"목소리로 부르는 음악"},
    {w:"그림",cat:"예술",desc:"붓이나 펜으로 그린 것"},
    {w:"편지",cat:"주고받기",desc:"마음을 적어 보내는 글"},
    {w:"지도",cat:"물건",desc:"길과 위치를 그린 것"},
    {w:"열쇠",cat:"물건",desc:"자물쇠를 여는 도구"},
    {w:"안경",cat:"몸에 걸치는 것",desc:"눈에 쓰는, 잘 보이게 하는 것"},
    {w:"우산",cat:"몸에 걸치는 것",desc:"비 올 때 펴서 쓰는 것"},
    {w:"신발",cat:"몸에 걸치는 것",desc:"발에 신는 것"},
    {w:"모자",cat:"몸에 걸치는 것",desc:"머리에 쓰는 것"},
    {w:"가방",cat:"몸에 걸치는 것",desc:"물건을 넣어 메고 다니는 것"},
    {w:"책상",cat:"가구",desc:"앉아서 공부하는 가구"},
    {w:"의자",cat:"가구",desc:"앉는 가구"},
    {w:"창문",cat:"가구",desc:"벽에 나서 밖이 보이는 것"},
    {w:"거울",cat:"가구",desc:"얼굴을 비춰 보는 것"},
    {w:"시계",cat:"물건",desc:"시간을 알려주는 물건"},
    {w:"전화",cat:"물건",desc:"멀리 있는 사람과 말하는 기기"},
    {w:"커피",cat:"음식",desc:"쓰고 향 좋은, 잠 깨는 음료"},
    {w:"우유",cat:"음식",desc:"소에서 나는 하얀 음료"},
    {w:"김치",cat:"음식",desc:"배추로 담그는 매운 반찬"},
    {w:"라면",cat:"음식",desc:"끓여 먹는 인스턴트 면"},
    {w:"만두",cat:"음식",desc:"소를 넣어 빚어 찌는 것"},
    {w:"사탕",cat:"음식",desc:"달고 딱딱한 군것질"},
    {w:"딸기",cat:"과일",desc:"빨갛고 씨가 콕콕 박힌 과일"},
    {w:"포도",cat:"과일",desc:"알알이 송이로 열리는 과일"},
    {w:"수박",cat:"과일",desc:"크고 속이 빨간 여름 과일"},
    {w:"참외",cat:"과일",desc:"노랗고 단 여름 과일"},
    {w:"토끼",cat:"동물",desc:"귀가 길고 깡충 뛰는 동물"},
    {w:"여우",cat:"동물",desc:"꾀 많다는 산짐승"},
    {w:"사자",cat:"동물",desc:"갈기 있는 밀림의 왕"},
    {w:"기차",cat:"교통",desc:"철길 위를 달리는 것"},
    {w:"버스",cat:"교통",desc:"많은 사람이 함께 타는 대중교통"},
    {w:"도로",cat:"교통",desc:"차가 다니는 길"},
    {w:"공원",cat:"장소",desc:"산책하고 쉬는 넓은 곳"},
    {w:"시장",cat:"장소",desc:"물건을 사고파는 곳"},
    {w:"병원",cat:"장소",desc:"아프면 치료받으러 가는 곳"},
    {w:"은행",cat:"장소",desc:"돈을 맡기고 찾는 곳"},
    {w:"교실",cat:"장소",desc:"수업을 듣는 방"},
    {w:"축구",cat:"운동",desc:"발로 공을 차는 운동"},
    {w:"야구",cat:"운동",desc:"방망이로 공을 치는 운동"},
    {w:"농구",cat:"운동",desc:"공을 높은 골대에 넣는 운동"},
    {w:"수영",cat:"운동",desc:"물에서 헤엄치는 운동"},
    {w:"바람",cat:"날씨·하늘",desc:"살랑 부는 공기의 흐름"},
    {w:"눈물",cat:"얼굴·표정",desc:"슬프면 눈에서 나오는 것"},
    {w:"미소",cat:"얼굴·표정",desc:"살짝 짓는 웃음"},
    {w:"얼굴",cat:"얼굴·표정",desc:"눈·코·입이 있는 곳"},
    {w:"마음",cat:"눈에 안 보이는 것",desc:"생각과 감정이 담긴 곳"},
    {w:"생각",cat:"눈에 안 보이는 것",desc:"머릿속에 떠올리는 것"},
    {w:"약속",cat:"주고받기",desc:"지키기로 한 다짐"},
    {w:"선물",cat:"주고받기",desc:"마음 담아 건네는 것"},
    {w:"영화",cat:"예술",desc:"극장에서 보는 것"},
    {w:"음악",cat:"예술",desc:"귀로 듣는 예술"},
    {w:"과학",cat:"학문",desc:"자연을 탐구하는 학문"},
    {w:"수학",cat:"학문",desc:"숫자와 도형의 학문"},
    {w:"역사",cat:"학문",desc:"지난 일의 기록"},
    {w:"지구",cat:"자연",desc:"우리가 사는 행성"},
    {w:"우주",cat:"자연",desc:"별과 은하가 있는 공간"},
    {w:"별빛",cat:"빛",desc:"밤하늘 별의 반짝임"},
    {w:"달빛",cat:"빛",desc:"밤을 비추는 달의 빛"},
    {w:"햇살",cat:"빛",desc:"내리쬐는 해의 빛"},
    {w:"안개",cat:"날씨·하늘",desc:"뿌옇게 낀 물방울"},
    {w:"이슬",cat:"날씨·하늘",desc:"새벽 풀잎에 맺힌 물방울"}
  ];
  // 세부 분류 -> 큰 갈래(1단계 힌트, 아주 넓음)
  var CAT2MEGA = {
    "과일":"자연·생물","동물":"자연·생물","자연":"자연·생물","날씨·하늘":"자연·생물","빛":"자연·생물","계절":"자연·생물",
    "음식":"사람이 만든 것","물건":"사람이 만든 것","가구":"사람이 만든 것","몸에 걸치는 것":"사람이 만든 것","교통":"사람이 만든 것","장소":"사람이 만든 것",
    "운동":"활동·문화","예술":"활동·문화","학문":"활동·문화",
    "사람":"사람·마음","눈에 안 보이는 것":"사람·마음","얼굴·표정":"사람·마음","주고받기":"사람·마음"
  };
  // 5단계 힌트: 큰 갈래 → 분류 → 설명 → 초성 → 첫 글자
  function hintsFor(obj){
    var w=obj.w, cho=decompose(w[0])[0]+' '+decompose(w[1])[0];
    return [ '큰 갈래 — '+(CAT2MEGA[obj.cat]||'?'), '분류 — '+obj.cat, obj.desc, '초성 — '+cho, '첫 글자 — '+w[0]+' _' ];
  }
  var MAX_TRIES = 6;
  var STORE_KEY = "hangulword:daily";

  function dayIndex(){
    var d=new Date();
    var t=Date.UTC(d.getFullYear(), d.getMonth(), d.getDate());
    var base=Date.UTC(2026,0,1);
    return Math.floor((t-base)/86400000);
  }
  function wordForDay(idx){ return WORDS[((idx % WORDS.length)+WORDS.length)%WORDS.length]; }
  function pickRandom(){ return WORDS[Math.floor(Math.random()*WORDS.length)]; }

  /* ================= 상태 ================= */
  var game=document.getElementById('game');
  var practice=false;
  var answer, answerObj, guesses, finished;

  function loadDaily(){
    try{
      var raw=localStorage.getItem(STORE_KEY);
      if(raw){ var s=JSON.parse(raw); if(s.day===dayIndex()) return s; }
    }catch(e){}
    return null;
  }
  function saveDaily(){
    if(practice) return;
    try{ localStorage.setItem(STORE_KEY, JSON.stringify({ day:dayIndex(), guesses:guesses, status: finished })); }catch(e){}
  }

  function startDaily(){
    practice=false;
    var obj=wordForDay(dayIndex()); answer=obj.w; answerObj=obj;
    var saved=loadDaily();
    guesses = saved ? saved.guesses.slice() : [];
    finished = saved ? saved.status : null;   // null | 'win' | 'lose'
    render();
  }
  function startPractice(){
    practice=true; var obj=pickRandom(); answer=obj.w; answerObj=obj; guesses=[]; finished=null; render();
  }

  /* ================= 렌더 ================= */
  function sylTile(ch, res, off){
    // off = 시작 슬롯 인덱스(0 또는 3), res=판정 6칸
    var d=decompose(ch);
    var chips='';
    for(var k=0;k<3;k++){
      if(d[k]==='') continue;           // 종성 없으면 칩 생략
      var cls=res[off+k];
      chips+='<span class="jamo '+(cls==='empty'?'X':cls)+'">'+d[k]+'</span>';
    }
    return '<div class="syl"><div class="syl-char">'+ch+'</div><div class="jamo-row">'+chips+'</div></div>';
  }
  function rowHtml(guess){
    var res=evaluate(guess, answer);
    return '<div class="row">'+ sylTile(guess[0],res,0) + sylTile(guess[1],res,3) +'</div>';
  }

  function render(){
    var rows=guesses.map(rowHtml).join('');
    var sub = practice ? '연습 모드 · 랜덤 단어' : '오늘의 단어 #'+dayIndex()+' · 하루 한 번';
    // 점진적 힌트: 틀린 횟수(=지금까지의 시도 수)만큼 열림, 최대 5개
    var allHints=hintsFor(answerObj), revealed=Math.min(guesses.length, allHints.length), hintsHtml;
    if(revealed===0){
      hintsHtml='<div class="hints locked">🔒 힌트 잠김 — 한 번 틀릴 때마다 하나씩 열려요</div>';
    } else {
      var items='';
      for(var h=0;h<revealed;h++){ items+='<div class="hint-item"><span class="hint-n">힌트 '+(h+1)+'</span>'+allHints[h]+'</div>'; }
      hintsHtml='<div class="hints">'+items+'</div>';
    }
    var body =
      '<h1 class="title">한글 단어 맞히기</h1>'+
      '<p class="sub">'+sub+' · '+guesses.length+'/'+MAX_TRIES+'</p>'+
      (finished ? '' : hintsHtml)+
      '<div class="board" id="board">'+rows+'</div>';

    if(finished){ body += '<div id="result"></div>'; }
    else {
      body +=
        '<div class="answerbox">'+
          '<input id="guess" type="text" inputmode="text" autocomplete="off" maxlength="2" placeholder="두 글자 (예: 사과)">'+
          '<button class="btn btn-primary" id="submit">입력</button>'+
        '</div>';
    }
    body +=
      '<div class="help">'+
        '<span class="swatch" style="background:var(--good)"></span><b>자리·글자 맞음</b> &nbsp; '+
        '<span class="swatch" style="background:#caa93a"></span><b>있지만 다른 자리</b> &nbsp; '+
        '<span class="swatch" style="background:#3a4150"></span><b>없음</b><br>'+
        '초성·중성·종성(자모) 단위로 판정해요. <b>한글 두 글자</b>를 입력하세요.'+
      '</div>';
    game.innerHTML=body;

    if(finished){ renderResult(); }
    else {
      var input=document.getElementById('guess');
      document.getElementById('submit').onclick=submitGuess;
      input.addEventListener('keydown', function(e){ if(e.key==='Enter'){ submitGuess(); } });
      input.focus();
    }
  }

  function submitGuess(){
    var input=document.getElementById('guess');
    var val=(input.value||'').trim();
    if(val.length!==2 || !isSyllable(val[0]) || !isSyllable(val[1])){
      GameShare.toast('완성된 한글 두 글자를 입력하세요');
      input.focus(); return;
    }
    guesses.push(val);
    if(val===answer) finished='win';
    else if(guesses.length>=MAX_TRIES) finished='lose';
    saveDaily();
    if(finished && !practice){
      GameStats.record('hangul-word', { score: finished==='win' ? (MAX_TRIES+1-guesses.length) : 0 });
    }
    render();
  }

  // 공유용 이모지 그리드: 정답의 자모 칸 기준으로 각 시도를 한 줄씩
  function shareGrid(){
    var a=slotsOf(answer);
    var aIdx=[]; for(var i=0;i<6;i++){ if(a[i]!=='') aIdx.push(i); }
    return guesses.map(function(g){
      var res=evaluate(g, answer);
      return aIdx.map(function(i){ return res[i]==='G'?'🟩':(res[i]==='Y'?'🟨':'⬜'); }).join('');
    }).join('\n');
  }

  function renderResult(){
    var box=document.getElementById('result');
    var win = finished==='win';
    var n=guesses.length;
    var head = win ? (n===1?'한 번에?! 🎯':'정답! 🎉') : '아쉬워요 😢';
    var grid = shareGrid();

    var statsHtml='';
    if(!practice && window.GameStats){
      var st=GameStats.get('hangul-word');
      statsHtml=
        '<div class="mystats">'+
          '<div class="stat">🔥 연속<b>'+st.streak+'일</b></div>'+
          '<div class="stat">Σ 누적<b>'+st.totalScore+'점</b></div>'+
          '<div class="stat">🏆 최고<b>'+st.bestScore+'/'+MAX_TRIES+'</b></div>'+
          '<div class="stat">🎮 플레이<b>'+st.plays+'판</b></div>'+
        '</div>';
    }

    box.innerHTML=
      '<div class="result">'+
        '<div class="headline">'+head+'</div>'+
        '<div class="answer">정답: <b>'+answer+'</b>'+(win?'':' · '+n+'/'+MAX_TRIES)+'</div>'+
        statsHtml+
        '<div class="actions">'+
          '<button class="btn btn-primary" id="share">📤 결과 공유하기</button>'+
          (practice
            ? '<button class="btn" id="again">🎲 연습 한 판 더</button>'
            : '<button class="btn" id="practice">🎲 연습 (랜덤 단어)</button>')+
          '<a class="btn" href="../">🎮 다른 게임 보기</a>'+
        '</div>'+
        (practice?'':'<p class="sub" style="margin-top:14px">내일 새 단어로 다시 만나요 👋</p>')+
      '</div>';

    document.getElementById('share').onclick=function(){
      var tag = practice ? '한글 단어 (연습)' : '한글 단어 #'+dayIndex();
      var line = win ? (n+'/'+MAX_TRIES) : 'X/'+MAX_TRIES;
      GameShare.share({
        text:'🟩 '+tag+' — '+line+'\n'+grid,
        url:'https://junstellar.github.io/games/hangul-word/'
      });
    };
    var pb=document.getElementById('practice'); if(pb) pb.onclick=startPractice;
    var ab=document.getElementById('again');    if(ab) ab.onclick=startPractice;
  }

  startDaily();
  </script>
</body>
</html>
