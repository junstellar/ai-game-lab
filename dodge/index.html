<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>낙하 회피 — AI 게임 랩</title>
<meta name="description" content="위에서 쏟아지는 것들을 좌우로 피하세요! 점점 빨라지는 원핸드 액션. 하트로 버티고 별을 먹어 점수 폭발. AI 코딩(바이브 코딩)으로 만든 무료 브라우저 게임.">
<meta name="keywords" content="낙하 회피 게임, 피하기 게임, 액션 게임, AI 코딩, 바이브 코딩, 무료 브라우저 게임">
<link rel="stylesheet" href="../shared.css">
<style>
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 18px; max-width:560px; margin:0 auto; }
  .topbar .home{ font-size:.85rem; color:var(--muted); }
  .game{ max-width:480px; margin:0 auto; padding:2px 12px 40px; }

  .stage{ position:relative; width:100%; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }
  canvas{ display:block; width:100%; touch-action:none; cursor:pointer; }

  .hud{ position:absolute; top:10px; left:12px; right:12px; display:flex; justify-content:space-between;
        pointer-events:none; font-weight:800; }
  .hud .score{ font-size:1.5rem; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  .hud .lives{ font-size:1.2rem; letter-spacing:2px; }
  .toastc{ position:absolute; top:56px; left:0; right:0; text-align:center; pointer-events:none;
           font-size:.95rem; font-weight:800; opacity:0; transition:opacity .15s; text-shadow:0 1px 6px rgba(0,0,0,.6); }
  .toastc.show{ opacity:1; }

  .overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:12px; background:rgba(10,12,20,.74); backdrop-filter:blur(2px); text-align:center; padding:20px; }
  .overlay h2{ margin:0; font-size:1.5rem; }
  .overlay p{ margin:0; color:var(--muted); font-size:.9rem; line-height:1.65; }
  .overlay .big{ font-size:3rem; font-weight:800; margin:2px 0; }
  .hidden{ display:none !important; }

  .mystats{ display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:300px; margin:4px auto 6px; }
  .mystats .stat{ background:rgba(26,29,36,.9); border:1px solid var(--border); border-radius:10px; padding:8px; font-size:.8rem; color:var(--muted); }
  .mystats .stat b{ display:block; color:var(--text); font-size:1.2rem; font-weight:800; margin-top:2px; }
  .actions{ display:flex; flex-direction:column; gap:9px; width:100%; max-width:260px; }
  .helpline{ text-align:center; color:var(--muted); font-size:.8rem; margin-top:12px; line-height:1.6; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="home" href="../">← 게임 랩</a>
    <span class="badge">🕹️ 낙하 회피</span>
    <span style="width:56px"></span>
  </div>

  <main class="game">
    <div class="stage" id="stage">
      <canvas id="cv"></canvas>
      <div class="hud"><span class="score" id="score">0</span><span class="lives" id="lives">❤️❤️❤️</span></div>
      <div class="toastc" id="toast"></div>

      <div class="overlay" id="startOverlay">
        <h2>🕹️ 낙하 회피</h2>
        <p>위에서 쏟아지는 <b>🪨 운석·💣 폭탄</b>을 피하세요!<br>
           <b>드래그</b>(또는 ← →)로 좌우 이동.<br>
           <b>⭐ 별</b>은 먹으면 점수 폭발, <b>💗 하트</b>는 생명 회복.<br>
           갈수록 빨라집니다. 하트 3개, 몇 점까지?</p>
        <p id="startBest" class="muted"></p>
        <button class="btn btn-primary" id="startBtn">탭해서 시작</button>
      </div>

      <div class="overlay hidden" id="overOverlay">
        <h2 id="overMsg">부딪혔다! 💥</h2>
        <div class="big" id="overScore">0</div>
        <div class="mystats" id="overStats"></div>
        <div class="actions">
          <button class="btn btn-primary" id="shareBtn">📤 기록 공유하기</button>
          <button class="btn" id="retryBtn">🔄 다시 하기</button>
          <a class="btn" href="../">🎮 다른 게임 보기</a>
        </div>
      </div>
    </div>
    <p class="helpline">드래그 · 또는 ← → 키 · ⭐별 먹고 💣폭탄 피하기</p>
  </main>

  <script src="../share.js"></script>
  <script src="../stats.js"></script>
  <script>
  /* =========================================================
     낙하 회피 — 좌우 이동으로 낙하물 피하기
     · 운석🪨/폭탄💣 = 맞으면 -1 생명 (0이면 게임오버)
     · 별⭐ = +점수 폭발 + 콤보, 하트💗 = +1 생명(최대 5)
     · 시간·점수에 따라 낙하 속도/스폰 빈도 증가. 점수 = 생존 점수 + 별
     ========================================================= */
  var GAME_ID='dodge';
  var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  var stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'), livesEl=document.getElementById('lives'), toastEl=document.getElementById('toast');
  var W,H,dpr;

  function resize(){
    W=Math.min(456, stage.clientWidth); H=560;
    dpr=window.devicePixelRatio||1;
    cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  var PLAYER_Y, PR=19;
  var state='ready';
  var player, items, particles, stars, lives, score, elapsed, spawnT, keyDir, recorded, hitFlash, shieldT;

  // 낙하물 종류: type,emoji,weight(스폰 확률),good?
  var KINDS=[
    {t:'rock', e:'🪨', bad:true,  r:17},
    {t:'bomb', e:'💣', bad:true,  r:17},
    {t:'star', e:'⭐', good:true, r:15},
    {t:'heart',e:'💗', good:true, r:15},
  ];

  function reset(){
    resize();
    PLAYER_Y=H-56;
    player={ x:W/2, tx:W/2 };
    items=[]; particles=[]; lives=3; score=0; elapsed=0; spawnT=0; keyDir=0;
    recorded=false; hitFlash=0; shieldT=0;
    stars=[]; for(var i=0;i<40;i++) stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.4+0.3, s:0.3+Math.random()*0.9});
    updateHud();
  }
  function updateHud(){
    scoreEl.textContent=Math.floor(score);
    var s=''; for(var i=0;i<lives;i++) s+='❤️';
    livesEl.textContent=s;
  }

  function difficulty(){ return 1.12 + Math.min(2.7, elapsed/18 + score/1300); }   // 1.12 → 3.82

  function spawn(){
    // 나쁜 것 위주, 가끔 좋은 것
    var roll=Math.random();
    var kind;
    if(roll<0.16) kind=KINDS[2];               // star 16%
    else if(roll<0.20) kind=KINDS[3];          // heart 4%
    else kind=Math.random()<0.6?KINDS[0]:KINDS[1];
    var d=difficulty();
    items.push({
      x: 24+Math.random()*(W-48),
      y: -24,
      vy: (1.85+Math.random()*1.2)*d,
      vx: (Math.random()-0.5)*0.9*d,
      rot: Math.random()*Math.PI, vr:(Math.random()-0.5)*0.12,
      kind:kind
    });
  }

  function toast(txt,color){
    toastEl.textContent=txt; toastEl.style.color=color||'#ffd166';
    toastEl.classList.add('show');
    clearTimeout(toast._t); toast._t=setTimeout(function(){ toastEl.classList.remove('show'); }, 650);
  }
  function burst(x,y,color,n){
    for(var i=0;i<(n||10);i++){
      var a=Math.random()*Math.PI*2, sp=1+Math.random()*3.5;
      particles.push({ x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1, life:1, color:color });
    }
  }

  function hit(){
    if(shieldT>0) return;
    lives--; hitFlash=1; shieldT=1.1;           // 피격 후 잠깐 무적
    burst(player.x, PLAYER_Y, '#ff5b6e', 16);
    updateHud();
    if(lives<=0) gameOver(); else toast('-1 ❤️', '#ff8a95');
  }

  function gameOver(){
    state='over';
    if(!recorded){
      recorded=true;
      var sc=Math.floor(score);
      var st=window.GameStats?GameStats.record(GAME_ID,{score:sc}):{bestScore:sc,plays:1,streak:1,totalScore:sc};
      var best = sc>0 && sc>=st.bestScore;
      document.getElementById('overMsg').textContent = best&&sc>=50?'최고 기록! 🎉':'부딪혔다! 💥';
      document.getElementById('overScore').textContent = sc+'점';
      document.getElementById('overStats').innerHTML=
        '<div class="stat">🏆 최고<b>'+st.bestScore+'점</b></div>'+
        '<div class="stat">Σ 누적<b>'+st.totalScore+'점</b></div>'+
        '<div class="stat">🔥 연속<b>'+st.streak+'일</b></div>'+
        '<div class="stat">🎮 플레이<b>'+st.plays+'판</b></div>';
    }
    setTimeout(function(){ document.getElementById('overOverlay').classList.remove('hidden'); }, 500);
  }

  /* ---------- 루프 ---------- */
  var last=0;
  function tick(ts){
    var dt=last?Math.min(2,(ts-last)/16.67):1; last=ts;
    if(state==='playing'){
      elapsed+=dt/60;
      score+=dt*0.08;                            // 생존 점수
      // 플레이어 이동
      if(keyDir) player.tx += keyDir*6*dt;
      player.tx=Math.max(PR, Math.min(W-PR, player.tx));
      player.x += (player.tx-player.x)*0.35;
      // 스폰
      spawnT-=dt;
      if(spawnT<=0){ spawn(); spawnT=Math.max(10, 38 - elapsed*1.05 - score*0.024); }
      // 낙하물
      for(var i=items.length-1;i>=0;i--){
        var o=items[i];
        o.y+=o.vy*dt; o.x+=o.vx*dt; o.rot+=o.vr*dt;
        if(o.x<o.kind.r||o.x>W-o.kind.r) o.vx*=-1;
        var dx=o.x-player.x, dy=o.y-PLAYER_Y;
        if(dx*dx+dy*dy < (o.kind.r+PR-4)*(o.kind.r+PR-4)){
          if(o.kind.bad){ items.splice(i,1); hit(); }
          else{
            items.splice(i,1);
            if(o.kind.t==='star'){ score+=10; burst(o.x,o.y,'#ffd166',14); toast('+10 ⭐','#ffd166'); }
            else{ if(lives<5){ lives++; updateHud(); } burst(o.x,o.y,'#ff7aa8',14); toast('+1 ❤️','#ff7aa8'); }
          }
          continue;
        }
        if(o.y>H+30) items.splice(i,1);
      }
      // 파티클
      for(var p=particles.length-1;p>=0;p--){
        var pt=particles[p]; pt.vy+=0.12*dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=0.035*dt;
        if(pt.life<=0) particles.splice(p,1);
      }
      if(hitFlash>0) hitFlash-=0.06*dt;
      if(shieldT>0) shieldT-=dt/60;
      updateHud();
    }
    draw(ts);
    requestAnimationFrame(tick);
  }

  function draw(ts){
    // 밤하늘 배경
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0e1230'); g.addColorStop(0.6,'#12142a'); g.addColorStop(1,'#0d0f1a');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    for(var s=0;s<stars.length;s++){
      var st=stars[s];
      if(state==='playing'){ st.y+=st.s*0.6; if(st.y>H){ st.y=0; st.x=Math.random()*W; } }
      ctx.globalAlpha=0.5+st.s*0.4; ctx.fillStyle='#cdd6ff';
      ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // 낙하물
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(var i=0;i<items.length;i++){
      var o=items[i];
      ctx.save(); ctx.translate(o.x,o.y); ctx.rotate(o.rot);
      ctx.font=(o.kind.r*2)+'px sans-serif';
      ctx.fillText(o.kind.e,0,1);
      ctx.restore();
    }
    // 파티클
    for(var p=0;p<particles.length;p++){
      var pt=particles[p]; ctx.globalAlpha=Math.max(0,pt.life); ctx.fillStyle=pt.color;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,2.6,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // 플레이어 (무적이면 깜빡)
    var blink = shieldT>0 && Math.floor(ts/90)%2===0;
    ctx.globalAlpha = blink?0.45:1;
    if(shieldT>0){ ctx.strokeStyle='rgba(120,200,255,.6)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(player.x,PLAYER_Y,PR+5,0,Math.PI*2); ctx.stroke(); }
    ctx.font='34px sans-serif'; ctx.fillText('🚀',player.x,PLAYER_Y);
    ctx.globalAlpha=1;

    // 피격 붉은 플래시
    if(hitFlash>0){ ctx.fillStyle='rgba(255,60,80,'+(hitFlash*0.35)+')'; ctx.fillRect(0,0,W,H); }
  }

  /* ---------- 입력 ---------- */
  function start(){
    reset(); state='playing'; last=0;
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('overOverlay').classList.add('hidden');
  }
  function pointAt(clientX){
    var rect=cv.getBoundingClientRect();
    player.tx=(clientX-rect.left)/rect.width*W;
  }
  var dragging=false;
  stage.addEventListener('pointerdown', function(e){
    if(e.target.closest('button')||e.target.closest('a')) return;
    if(state==='playing'){ dragging=true; pointAt(e.clientX); e.preventDefault(); }
  });
  stage.addEventListener('pointermove', function(e){ if(dragging&&state==='playing'){ pointAt(e.clientX); } });
  window.addEventListener('pointerup', function(){ dragging=false; });
  document.addEventListener('keydown', function(e){
    if(e.code==='ArrowLeft'){ keyDir=-1; if(state==='playing')e.preventDefault(); }
    else if(e.code==='ArrowRight'){ keyDir=1; if(state==='playing')e.preventDefault(); }
    else if((e.code==='Space'||e.code==='Enter')&&state!=='playing'){ e.preventDefault(); start(); }
  });
  document.addEventListener('keyup', function(e){
    if((e.code==='ArrowLeft'&&keyDir<0)||(e.code==='ArrowRight'&&keyDir>0)) keyDir=0;
  });
  document.getElementById('startBtn').onclick=start;
  document.getElementById('retryBtn').onclick=start;
  document.getElementById('shareBtn').onclick=function(){
    var st=window.GameStats?GameStats.get(GAME_ID):{bestScore:Math.floor(score)};
    GameShare.share({
      text:'🕹️ 낙하 회피 — '+Math.floor(score)+'점! (최고 '+st.bestScore+'점)\n너도 피해봐 👇',
      url:'https://junstellar.github.io/games/dodge/'
    });
  };

  (function(){ if(window.GameStats){ var st=GameStats.get(GAME_ID);
    if(st.bestScore>0) document.getElementById('startBest').textContent='🏆 내 최고 기록: '+st.bestScore+'점'; } })();
  window.addEventListener('resize', function(){ if(state!=='playing') reset(); });

  reset();
  requestAnimationFrame(tick);
  </script>
</body>
</html>
