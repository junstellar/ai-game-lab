<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>디저트 탑 쌓기 — AI 게임 랩</title>
<meta name="description" content="팬케이크·마카롱·젤리를 타이밍 맞춰 쌓아 올리는 원버튼 아케이드. 정확히 겹치면 체리가 톡! 젤리는… 흔들립니다.">
<link rel="stylesheet" href="../shared.css">
<style>
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 18px; max-width:560px; margin:0 auto; }
  .topbar .home{ font-size:.85rem; color:var(--muted); }
  .game{ max-width:480px; margin:0 auto; padding:2px 12px 40px; }

  .stage{ position:relative; width:100%; border-radius:var(--radius); overflow:hidden;
          border:1px solid var(--border); }
  canvas{ display:block; width:100%; touch-action:none; cursor:pointer; }

  .score{ position:absolute; top:12px; left:0; right:0; text-align:center; pointer-events:none;
          font-size:2.2rem; font-weight:800; color:#6b4632; text-shadow:0 1px 0 rgba(255,255,255,.6); }
  .combo{ position:absolute; top:64px; left:0; right:0; text-align:center; pointer-events:none;
          font-size:.9rem; font-weight:800; color:#e11d74; opacity:0; transition:opacity .15s;
          text-shadow:0 1px 0 rgba(255,255,255,.7); }
  .combo.show{ opacity:1; }

  .overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:12px; background:rgba(24,16,20,.72); backdrop-filter:blur(2px); text-align:center; padding:20px; }
  .overlay h2{ margin:0; font-size:1.5rem; }
  .overlay p{ margin:0; color:#e8dbe0; font-size:.9rem; line-height:1.65; }
  .overlay .big{ font-size:3rem; font-weight:800; margin:2px 0; }
  .hidden{ display:none !important; }

  .mystats{ display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:300px; margin:4px auto 6px; }
  .mystats .stat{ background:rgba(26,29,36,.9); border:1px solid var(--border); border-radius:10px; padding:8px; font-size:.8rem; color:var(--muted); }
  .mystats .stat b{ display:block; color:var(--text); font-size:1.2rem; font-weight:800; margin-top:2px; }
  .actions{ display:flex; flex-direction:column; gap:9px; width:100%; max-width:260px; }

  .helpline{ text-align:center; color:var(--muted); font-size:.8rem; margin-top:12px; line-height:1.6; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="home" href="../">← 게임 랩</a>
    <span class="badge">🍰 디저트 탑 쌓기</span>
    <span style="width:56px"></span>
  </div>

  <main class="game">
    <div class="stage" id="stage">
      <canvas id="cv"></canvas>
      <div class="score" id="score">0</div>
      <div class="combo" id="combo">PERFECT!</div>

      <div class="overlay" id="startOverlay">
        <h2>🍰 디저트 탑 쌓기</h2>
        <p>팬케이크·마카롱·젤리를 <b>탭</b> 타이밍으로 쌓아 올리세요.<br>
           삐끗한 만큼 잘려나가고, <b>정확히 겹치면 PERFECT</b> — 체리가 톡 올라갑니다.<br>
           그리고… <b>젤리는 착지 후에도 흔들립니다.</b> 🍮</p>
        <p id="startBest" class="muted"></p>
        <button class="btn btn-primary" id="startBtn">탭해서 시작</button>
      </div>

      <div class="overlay hidden" id="overOverlay">
        <h2 id="overMsg">와르르! 🍮</h2>
        <div class="big" id="overFloors">0층</div>
        <div class="mystats" id="overStats"></div>
        <div class="actions">
          <button class="btn btn-primary" id="shareBtn">📤 기록 공유하기</button>
          <button class="btn" id="retryBtn">🔄 다시 쌓기</button>
          <a class="btn" href="../">🎮 다른 게임 보기</a>
        </div>
      </div>
    </div>
    <p class="helpline">한 판 30초 · 스페이스바 가능 · ⚠️ 젤리층은 착지 후에도 흔들려요</p>
  </main>

  <script src="../share.js"></script>
  <script src="../stats.js"></script>
  <script>
  /* =========================================================
     디저트 탑 쌓기 — 원버튼 타이밍 아케이드 (디저트 리브랜딩)
     · 좌우로 움직이는 디저트를 탭으로 낙하 → 겹친 부분만 남음
     · 오차 PERFECT_TOL 이내 = PERFECT(안 잘림 + 체리 가니쉬,
       연속이면 폭 +3 회복)
     · 젤리층은 착지 후 좌우로 흔들리며(감쇠 진동) 다음 착지의
       판정 기준도 "흔들리는 실시간 위치"
     ========================================================= */
  var BLOCK_H = 26;
  var PERFECT_TOL = 5;
  var GROUND = 46;
  var GAME_ID = 'stack-tower';

  var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  var stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'), comboEl=document.getElementById('combo');
  var W, H, dpr;

  function resize(){
    W = Math.min(456, stage.clientWidth);
    H = 560;
    dpr = window.devicePixelRatio || 1;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  var state='ready';
  var tower, current, pieces, splashes, sprinkles, floors, combo, cameraY, camTarget, recorded, squish, flash;
  var INITIAL_W;

  /* ---------- 디저트 타입 ---------- */
  // 4층마다 젤리, 나머지는 팬케이크→마카롱→생크림→초코 순환
  function typeOf(i){
    if(i>0 && i%4===3) return 'jelly';
    return ['pancake','macaron','cream','choco'][(i - Math.floor(i/4)) % 4];
  }
  function pastelHue(i){ return (i*47+310)%360; }   // 마카롱 색 순환

  function makeBlock(i, x, w){
    return { x:x, w:w, type:typeOf(i), hue:pastelHue(i), drips:[], garnish:null, wobble:null };
  }

  function reset(){
    resize();
    INITIAL_W = Math.round(W*0.52);
    tower=[ makeBlock(0, (W-INITIAL_W)/2, INITIAL_W) ];
    pieces=[]; splashes=[]; floors=0; combo=0; cameraY=0; camTarget=0; recorded=false; squish=null; flash=null;
    sprinkles=[];
    for(var i=0;i<26;i++){
      sprinkles.push({ x:Math.random()*W, y:Math.random()*H, r:1.5+Math.random()*2,
                       hue:[350,200,45,140,280][i%5], a:.35+Math.random()*.3 });
    }
    spawn();
    scoreEl.textContent='0';
  }

  function spawn(){
    var prev=tower[tower.length-1];
    var fromLeft = tower.length % 2 === 1;
    current={
      w: prev.w,
      x: fromLeft ? -prev.w*0.6 : W - prev.w*0.4,
      dir: fromLeft ? 1 : -1,
      speed: Math.min(5.6, 2.3 + floors*0.09),
      type: typeOf(tower.length), hue: pastelHue(tower.length),
      drips:[], garnish:null, wobble:null
    };
  }

  function yOf(i){ return H - GROUND - (i+1)*BLOCK_H + cameraY; }

  // 젤리 흔들림: 감쇠 사인파 오프셋
  function wobbleDx(b){
    if(!b.wobble) return 0;
    var t=b.wobble.t;
    return 9*Math.sin(t*9)*Math.exp(-t*1.4);
  }

  /* ---------- 게임 로직 ---------- */
  function drop(){
    if(state!=='playing') return;
    var prev=tower[tower.length-1];
    var prevX=prev.x + wobbleDx(prev);          // ★ 흔들리는 실시간 위치 기준 판정
    var left=Math.max(current.x, prevX);
    var right=Math.min(current.x+current.w, prevX+prev.w);
    var overlap=right-left;

    // 젤리가 흔들리던 중이면 그 자리에 눌러 고정
    prev.x=prevX; prev.wobble=null;

    if(overlap<=0){
      pieces.push({ x:current.x, w:current.w, y:yOf(tower.length), vy:0, type:current.type, hue:current.hue });
      gameOver();
      return;
    }

    var delta=Math.abs(current.x - prevX);
    var nb;
    if(delta<=PERFECT_TOL){                     // PERFECT
      combo++;
      var grow = combo>=2 ? 3 : 0;
      var nw=Math.min(INITIAL_W, prev.w+grow);
      nb=makeBlock(tower.length, prev.x-(nw-prev.w)/2, nw);
      nb.garnish={ kind: (tower.length%2?'strawberry':'cherry'), t:0 };
      flash={ i:tower.length, t:.5 };
      flashCombo(combo>=2 ? 'PERFECT ×'+combo+' (+폭 회복!)' : 'PERFECT! 🍒');
    } else {
      combo=0;
      if(current.x<prevX) pieces.push({ x:current.x, w:prevX-current.x, y:yOf(tower.length), vy:0, type:current.type, hue:current.hue });
      else pieces.push({ x:right, w:(current.x+current.w)-right, y:yOf(tower.length), vy:0, type:current.type, hue:current.hue });
      nb=makeBlock(tower.length, left, overlap);
    }

    // 착지 연출: 스쿼시 + 크림/시럽 튀김 + 가장자리 드립
    squish={ i:tower.length, t:0 };
    spawnSplash(nb);
    addDrips(nb);
    if(nb.type==='jelly') nb.wobble={ t:0 };    // ★ 젤리는 흔들리기 시작

    tower.push(nb);
    floors++;
    scoreEl.textContent=floors;
    var towerPix=(tower.length+1)*BLOCK_H + GROUND;
    if(towerPix > H*0.55) camTarget = towerPix - H*0.55;
    spawn();
  }

  function creamColor(type){
    return type==='choco' ? '#5a3a24' : (type==='jelly' ? 'rgba(240,80,120,.85)' : '#fff3df');
  }
  function spawnSplash(b){
    var y=yOf(tower.length)+BLOCK_H-6;
    for(var k=0;k<5;k++){
      var side = k%2? 1:-1;
      splashes.push({ x: side>0? b.x+b.w : b.x, y:y, vx: side*(1+Math.random()*1.8), vy:-(1+Math.random()*1.6),
                      r:2+Math.random()*2.5, life:1, color:creamColor(b.type) });
    }
  }
  function addDrips(b){
    var n=1+Math.floor(Math.random()*2);
    for(var k=0;k<n;k++){
      b.drips.push({ dx: .15+Math.random()*.7, r: 2.5+Math.random()*2 });   // dx = 폭 비율 위치
    }
  }

  function flashCombo(text){
    comboEl.textContent=text;
    comboEl.classList.add('show');
    clearTimeout(flashCombo._t);
    flashCombo._t=setTimeout(function(){ comboEl.classList.remove('show'); }, 750);
  }

  function gameOver(){
    state='over';
    if(!recorded){
      recorded=true;
      var st = window.GameStats ? GameStats.record(GAME_ID, { score: floors }) : {bestScore:floors, plays:1, streak:1, totalScore:floors};
      var isBest = floors>0 && floors>=st.bestScore;
      document.getElementById('overMsg').textContent = isBest && floors>=5 ? '최고 기록! 🎉' : '와르르! 🍮';
      document.getElementById('overFloors').textContent = floors+'층';
      document.getElementById('overStats').innerHTML =
        '<div class="stat">🏆 최고<b>'+st.bestScore+'층</b></div>'+
        '<div class="stat">Σ 누적<b>'+st.totalScore+'층</b></div>'+
        '<div class="stat">🔥 연속<b>'+st.streak+'일</b></div>'+
        '<div class="stat">🎮 플레이<b>'+st.plays+'판</b></div>';
    }
    setTimeout(function(){ document.getElementById('overOverlay').classList.remove('hidden'); }, 550);
  }

  /* ---------- 루프 ---------- */
  function tick(){
    if(state==='playing'){
      current.x += current.dir*current.speed;
      if(current.x < -current.w*0.6){ current.x=-current.w*0.6; current.dir=1; }
      if(current.x > W-current.w*0.4){ current.x=W-current.w*0.4; current.dir=-1; }
    }
    for(var i=pieces.length-1;i>=0;i--){
      pieces[i].vy+=0.55; pieces[i].y+=pieces[i].vy;
      if(pieces[i].y>H+80) pieces.splice(i,1);
    }
    for(var s=splashes.length-1;s>=0;s--){
      var sp=splashes[s];
      sp.vy+=0.25; sp.x+=sp.vx; sp.y+=sp.vy; sp.life-=0.03;
      if(sp.life<=0) splashes.splice(s,1);
    }
    // 젤리 흔들림/스쿼시/플래시/가니쉬 진행
    for(var b=0;b<tower.length;b++){
      if(tower[b].wobble){ tower[b].wobble.t+=1/60; if(tower[b].wobble.t>2.6) tower[b].wobble=null; }
      if(tower[b].garnish && tower[b].garnish.t<1) tower[b].garnish.t=Math.min(1, tower[b].garnish.t+0.06);
    }
    if(squish){ squish.t+=0.09; if(squish.t>=1) squish=null; }
    if(flash){ flash.t-=0.03; if(flash.t<=0) flash=null; }
    cameraY += (camTarget-cameraY)*0.12;

    draw();
    requestAnimationFrame(tick);
  }

  /* ---------- 렌더링 (디저트) ---------- */
  function rr(x,y,w,h,r){
    r=Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawDessert(b, x, y, alpha){
    var w=b.w, h=BLOCK_H-2;
    ctx.globalAlpha=(alpha==null?1:alpha);
    var g;
    if(b.type==='pancake'){
      g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,'#f4b95e'); g.addColorStop(1,'#d78a2e');
      ctx.fillStyle=g; rr(x,y+3,w,h-3,7); ctx.fill();
      ctx.fillStyle='#f9d98d'; rr(x,y,w,9,5); ctx.fill();                 // 윗면(버터빛)
      ctx.fillStyle='#b96f22';                                            // 시럽 드립
      for(var d=0;d<b.drips.length;d++){ var dr=b.drips[d];
        ctx.beginPath(); ctx.arc(x+w*dr.dx, y+h-1, dr.r, 0, Math.PI); ctx.fill(); }
    }
    else if(b.type==='macaron'){
      var hue=b.hue;
      ctx.fillStyle='hsl('+hue+',70%,74%)'; rr(x,y,w,h*0.42,8); ctx.fill();          // 위 꼬끄
      ctx.fillStyle='#fff6ea'; rr(x+2,y+h*0.40,w-4,h*0.22,4); ctx.fill();            // 필링
      ctx.fillStyle='hsl('+hue+',62%,64%)'; rr(x,y+h*0.58,w,h*0.42,8); ctx.fill();   // 아래 꼬끄
      ctx.fillStyle='rgba(255,255,255,.35)'; rr(x+5,y+2,w*0.3,3,2); ctx.fill();      // 광택
    }
    else if(b.type==='cream'){
      g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,'#fffcf4'); g.addColorStop(1,'#f3e3c5');
      ctx.fillStyle=g; rr(x,y,w,h-4,8); ctx.fill();
      ctx.fillStyle='#f3e3c5';                                            // 물결 밑단
      var n=Math.max(3, Math.round(w/26));
      for(var m=0;m<n;m++){ var mx=x+(w/n)*(m+0.5);
        ctx.beginPath(); ctx.arc(mx, y+h-4, w/n*0.5, 0, Math.PI); ctx.fill(); }
      ctx.fillStyle='rgba(255,255,255,.8)'; rr(x+5,y+2,w*0.35,3,2); ctx.fill();
    }
    else if(b.type==='choco'){
      g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,'#6b4630'); g.addColorStop(1,'#3f2817');
      ctx.fillStyle=g; rr(x,y+3,w,h-3,7); ctx.fill();
      ctx.fillStyle='#845838'; rr(x,y,w,8,5); ctx.fill();
      ctx.fillStyle='#2e1d10';
      for(var d2=0;d2<b.drips.length;d2++){ var dr2=b.drips[d2];
        ctx.beginPath(); ctx.arc(x+w*dr2.dx, y+h-1, dr2.r, 0, Math.PI); ctx.fill(); }
      ctx.fillStyle='rgba(255,255,255,.18)'; rr(x+5,y+2,w*0.25,3,2); ctx.fill();
    }
    else { // jelly
      ctx.globalAlpha=(alpha==null?0.88:alpha*0.88);
      g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,'#ff6d9d'); g.addColorStop(1,'#e73571');
      ctx.fillStyle=g; rr(x,y,w,h,9); ctx.fill();
      ctx.globalAlpha=(alpha==null?1:alpha);
      ctx.fillStyle='rgba(255,255,255,.55)';                              // 젤리 광택
      ctx.beginPath(); ctx.ellipse(x+w*0.28, y+6, w*0.2, 3.4, -0.15, 0, Math.PI*2); ctx.fill();
    }
    // PERFECT 가니쉬 (체리/딸기, 통통 안착)
    if(b.garnish){
      var gt=b.garnish.t, bounce=Math.sin(Math.min(1,gt)*Math.PI*0.5);
      var gx=x+w/2, gy=y-6-(1-bounce)*18;
      if(b.garnish.kind==='cherry'){
        ctx.strokeStyle='#7a4a1f'; ctx.lineWidth=1.6;
        ctx.beginPath(); ctx.moveTo(gx,gy-4); ctx.quadraticCurveTo(gx+4,gy-10,gx+7,gy-11); ctx.stroke();
        ctx.fillStyle='#e0294a'; ctx.beginPath(); ctx.arc(gx,gy,5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.6)'; ctx.beginPath(); ctx.arc(gx-1.8,gy-1.8,1.6,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle='#e8385d'; ctx.beginPath();
        ctx.moveTo(gx,gy+4); ctx.quadraticCurveTo(gx-6,gy-2,gx-3,gy-5); ctx.lineTo(gx+3,gy-5);
        ctx.quadraticCurveTo(gx+6,gy-2,gx,gy+4); ctx.fill();
        ctx.fillStyle='#3f9e4d'; ctx.fillRect(gx-3,gy-7,6,3);
      }
    }
    ctx.globalAlpha=1;
  }

  function draw(){
    // 파스텔 배경 (애프터눈 티)
    var bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#ffe9f0'); bg.addColorStop(0.55,'#fff3e2'); bg.addColorStop(1,'#ffe8cf');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // 스프링클(배경 장식, 살짝 패럴랙스)
    for(var sp=0;sp<sprinkles.length;sp++){
      var s=sprinkles[sp];
      var sy=(s.y + cameraY*0.25) % H; if(sy<0) sy+=H;
      ctx.globalAlpha=s.a; ctx.fillStyle='hsl('+s.hue+',75%,70%)';
      ctx.beginPath(); ctx.arc(s.x, sy, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // 케이크 스탠드(접시+다리) — 탑과 함께 스크롤
    var base=tower[0];
    var py=yOf(0)+BLOCK_H-2;
    if(py<H+80){
      ctx.fillStyle='rgba(120,80,60,.12)';
      ctx.beginPath(); ctx.ellipse(base.x+base.w/2, py+34, base.w*0.62, 7, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#fdfaf5'; rr(base.x-26, py, base.w+52, 9, 5); ctx.fill();          // 접시
      ctx.fillStyle='#e8ded0'; rr(base.x-26, py+7, base.w+52, 3, 2); ctx.fill();
      ctx.fillStyle='#f1e9dc'; rr(base.x+base.w/2-8, py+9, 16, 18, 4); ctx.fill();      // 기둥
      ctx.fillStyle='#e8ded0'; rr(base.x+base.w/2-30, py+26, 60, 7, 4); ctx.fill();     // 받침
    }

    // 탑 (아래 → 위)
    for(var i=0;i<tower.length;i++){
      var b=tower[i];
      var y=yOf(i);
      if(y<-BLOCK_H-24 || y>H+BLOCK_H) continue;
      var x=b.x + wobbleDx(b);
      if(squish && squish.i===i){
        var t=Math.min(1,squish.t), k=Math.sin(t*Math.PI)* (1-t*0.4);
        var sx=1+0.16*k, sy2=1-0.22*k;
        ctx.save();
        ctx.translate(x+b.w/2, y+BLOCK_H-2);
        ctx.scale(sx, sy2);
        ctx.translate(-(x+b.w/2), -(y+BLOCK_H-2));
        drawDessert(b, x, y);
        ctx.restore();
      } else {
        drawDessert(b, x, y);
      }
      if(flash && flash.i===i && flash.t>0){
        ctx.globalAlpha=flash.t; ctx.fillStyle='#ffffff';
        rr(x, y, b.w, BLOCK_H-2, 8); ctx.fill(); ctx.globalAlpha=1;
      }
    }

    // 움직이는 디저트
    if(state==='playing') drawDessert(current, current.x, yOf(tower.length));

    // 잘린 조각 (떨어지며 흐려짐)
    for(var j=0;j<pieces.length;j++){
      var p=pieces[j];
      drawDessert({ w:p.w, type:p.type, hue:p.hue, drips:[], garnish:null, wobble:null },
                  p.x, p.y, Math.max(.15, .85 - p.vy*0.05));
    }
    // 크림/시럽 튀김
    for(var q=0;q<splashes.length;q++){
      var c=splashes[q];
      ctx.globalAlpha=Math.max(0,c.life); ctx.fillStyle=c.color;
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  /* ---------- 입력/상태 ---------- */
  function start(){
    reset();
    state='playing';
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('overOverlay').classList.add('hidden');
  }

  stage.addEventListener('pointerdown', function(e){
    if(e.target.closest('button')||e.target.closest('a')) return;
    if(state==='playing'){ e.preventDefault(); drop(); }
  });
  document.addEventListener('keydown', function(e){
    if(e.code==='Space'||e.code==='Enter'){
      if(state==='playing'){ e.preventDefault(); drop(); }
      else if(state==='ready'){ e.preventDefault(); start(); }
    }
  });
  document.getElementById('startBtn').onclick=start;
  document.getElementById('startOverlay').addEventListener('pointerdown', function(e){
    if(state==='ready'){ e.preventDefault(); start(); }
  });
  document.getElementById('retryBtn').onclick=start;
  document.getElementById('shareBtn').onclick=function(){
    var st=window.GameStats?GameStats.get(GAME_ID):{bestScore:floors};
    GameShare.share({
      text:'🍰 디저트 탑 쌓기 — '+floors+'층! (최고 '+st.bestScore+'층)\n너도 쌓아봐 👇',
      url:'https://junstellar.github.io/games/stack-tower/'
    });
  };

  (function(){
    if(window.GameStats){
      var st=GameStats.get(GAME_ID);
      if(st.bestScore>0) document.getElementById('startBest').textContent='🏆 내 최고 기록: '+st.bestScore+'층';
    }
  })();

  window.addEventListener('resize', function(){ if(state!=='playing'){ reset(); } });

  reset();
  tick();
  </script>
</body>
</html>
